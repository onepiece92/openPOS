name: pos_app
description: Offline-first Flutter POS — single-user, works fully without internet.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Database (Drift / SQLite) ─────────────────────────────────────────
  drift: ^2.20.3
  sqlite3: ^2.9.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # ── Local Preferences ─────────────────────────────────────────────────
  hive_flutter: ^1.1.0

  # ── Navigation ────────────────────────────────────────────────────────
  go_router: ^14.2.0

  # ── Printing (ESC/POS) ────────────────────────────────────────────────
  esc_pos_utils_plus: ^2.0.4
  flutter_thermal_printer: ^0.0.9
  pdf: ^3.11.1
  printing: ^5.13.2

  # ── Camera & Images ───────────────────────────────────────────────────
  image_picker: ^1.1.2

  # ── File System & Export ──────────────────────────────────────────────
  share_plus: ^10.0.2
  csv: ^6.0.0
  permission_handler: ^11.3.1

  # ── Models & Serialization ────────────────────────────────────────────
  json_annotation: ^4.9.0

  # ── External Links ────────────────────────────────────────────────────
  url_launcher: ^6.3.0

  # ── Utilities ─────────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.2
  collection: ^1.18.0
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # ── Code Generation ───────────────────────────────────────────────────
  build_runner: ^2.4.12
  drift_dev: ^2.20.3
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.4
  # riverpod_generator omitted — providers written manually (no @riverpod needed)

  # ── Linting (re-enable once custom_lint supports analyzer ^7.x) ───────
  # custom_lint: ^0.7.3
  # riverpod_lint: ^2.6.1

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/images/logo.jpg"
  image_path: "assets/images/logo.jpg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.jpg"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/locales/
    - assets/images/
    - assets/fonts/

  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
        - asset: assets/fonts/JetBrainsMono-Italic.ttf
          style: italic
        - asset: assets/fonts/JetBrainsMono-BoldItalic.ttf
          weight: 700
          style: italic
